name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - run: go test ./...
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - run: go build -ldflags "-X main.version=$(git describe --always --tags)" ./cmd/lyrics/
  build-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Install libobs-dev
        run: sudo apt-get install -y libobs-dev
      - name: Build OBS plugin
        run: |
          CGO_CFLAGS="-I/usr/include/obs" CGO_LDFLAGS="-lobs" \
            go build -buildmode=c-shared \
            -ldflags "-X main.pluginVersion=$(git describe --always --tags)" \
            -o spotify-lyrics.so \
            ./plugin/
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

