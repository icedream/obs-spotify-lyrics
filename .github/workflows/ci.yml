name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  OBS_VERSION: "32.1.2"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: 'go.mod'
      # plugin/ has no tests and requires OBS CGO; test only pure-Go packages
      - run: go test ./cmd/... ./internal/...
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version-file: 'go.mod'
      - run: go build -ldflags "-X main.version=$(git describe --always --tags)" ./cmd/lyrics/
  build-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version-file: 'go.mod'
      - name: Install libobs-dev
        run: sudo apt-get install -y libobs-dev
      - name: Build OBS plugin
        run: |
          CGO_CFLAGS="-I/usr/include/obs" CGO_LDFLAGS="-lobs" \
            go build -buildmode=c-shared \
            -ldflags "-X main.pluginVersion=$(git describe --always --tags)" \
            -o spotify-lyrics.so \
            ./plugin/
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: Install libobs-dev
        run: sudo apt-get update -y && sudo apt-get install -y libobs-dev
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  build-binary:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suffix: [linux-amd64, linux-arm64, windows-amd64, windows-arm64]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - run: make build-binary-${{ matrix.suffix }}
      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.suffix }}
          path: lyrics-${{ matrix.suffix }}*
          retention-days: 1

  build-plugin-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - {runner: ubuntu-latest,    suffix: linux-amd64}
          - {runner: ubuntu-24.04-arm, suffix: linux-arm64}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: Install libobs-dev
        run: sudo apt-get update -y && sudo apt-get install -y libobs-dev
      - run: make build-plugin-${{ matrix.suffix }}

  build-plugin-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: Install MinGW cross-compiler and gendef
        run: sudo apt-get install -y mingw-w64 mingw-w64-tools
      - name: Cache OBS Windows SDK
        uses: actions/cache@v6
        with:
          path: |
            obs-src
            obs-win-sdk
          key: obs-win-sdk-${{ env.OBS_VERSION }}-x64
      - run: make build-plugin-windows-amd64
      - uses: actions/upload-artifact@v7
        with:
          name: plugin-windows-amd64
          path: spotify-lyrics-windows-amd64.dll
          retention-days: 1

  sign-windows-binaries:
    needs: [build-binary, build-plugin-windows]
    runs-on: ubuntu-latest
    concurrency:
      group: signing
      cancel-in-progress: false
    steps:
      - name: Check signing credentials
        id: check
        env:
          OSSLSIGNSERVER_URL: ${{ secrets.OSSLSIGNSERVER_URL }}
          OSSLSIGNSERVER_API_KEY_SECRET: ${{ secrets.OSSLSIGNSERVER_API_KEY_SECRET }}
          OSSLSIGNSERVER_PROFILE: ${{ vars.OSSLSIGNSERVER_PROFILE }}
        run: |
          if [ -z "$OSSLSIGNSERVER_URL" ] || [ -z "$OSSLSIGNSERVER_API_KEY_SECRET" ] || [ -z "$OSSLSIGNSERVER_PROFILE" ]; then
            echo "available=false" >> $GITHUB_OUTPUT
            echo "Signing credentials not available"
            exit 0
          fi
          echo "available=true" >> $GITHUB_OUTPUT
      - uses: actions/download-artifact@v8
        if: steps.check.outputs.available == 'true'
        with:
          name: binary-windows-amd64
          path: artifacts
      - uses: actions/download-artifact@v8
        if: steps.check.outputs.available == 'true'
        with:
          name: binary-windows-arm64
          path: artifacts
      - uses: actions/download-artifact@v8
        if: steps.check.outputs.available == 'true'
        with:
          name: plugin-windows-amd64
          path: artifacts
      - name: Sign lyrics-windows-amd64.exe
        if: steps.check.outputs.available == 'true'
        uses: icedream/sign-with-osslsignserver-action@7425d525e730035301735d225c2dd4da025d13c2
        with:
          url: ${{ secrets.OSSLSIGNSERVER_URL }}
          api-key-secret: ${{ secrets.OSSLSIGNSERVER_API_KEY_SECRET }}
          profile: ${{ vars.OSSLSIGNSERVER_PROFILE }}
          file: artifacts/lyrics-windows-amd64.exe
          description: 'Spotify Lyrics for OBS'
          description-url: 'https://github.com/icedream/obs-spotify-lyrics'
      - name: Sign lyrics-windows-arm64.exe
        if: steps.check.outputs.available == 'true'
        uses: icedream/sign-with-osslsignserver-action@7425d525e730035301735d225c2dd4da025d13c2
        with:
          url: ${{ secrets.OSSLSIGNSERVER_URL }}
          api-key-secret: ${{ secrets.OSSLSIGNSERVER_API_KEY_SECRET }}
          profile: ${{ vars.OSSLSIGNSERVER_PROFILE }}
          file: artifacts/lyrics-windows-arm64.exe
          description: 'Spotify Lyrics for OBS'
          description-url: 'https://github.com/icedream/obs-spotify-lyrics'
      - name: Sign spotify-lyrics-windows-amd64.dll
        if: steps.check.outputs.available == 'true'
        uses: icedream/sign-with-osslsignserver-action@7425d525e730035301735d225c2dd4da025d13c2
        with:
          url: ${{ secrets.OSSLSIGNSERVER_URL }}
          api-key-secret: ${{ secrets.OSSLSIGNSERVER_API_KEY_SECRET }}
          profile: ${{ vars.OSSLSIGNSERVER_PROFILE }}
          file: artifacts/spotify-lyrics-windows-amd64.dll
          description: 'Spotify Lyrics for OBS'
          description-url: 'https://github.com/icedream/obs-spotify-lyrics'
      - uses: actions/upload-artifact@v7
        if: steps.check.outputs.available == 'true'
        with:
          name: binary-windows-amd64
          path: artifacts/lyrics-windows-amd64.exe
          overwrite: true
      - uses: actions/upload-artifact@v7
        if: steps.check.outputs.available == 'true'
        with:
          name: binary-windows-arm64
          path: artifacts/lyrics-windows-arm64.exe
          overwrite: true
      - uses: actions/upload-artifact@v7
        if: steps.check.outputs.available == 'true'
        with:
          name: plugin-windows-amd64
          path: artifacts/spotify-lyrics-windows-amd64.dll
          overwrite: true

  build-installer-windows:
    needs: [sign-windows-binaries]
    if: success() || (needs.sign-windows-binaries.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: binary-windows-amd64
      - uses: actions/download-artifact@v8
        with:
          name: plugin-windows-amd64
      - name: Install NSIS
        run: sudo apt-get update -y && sudo apt-get install -y nsis
      - run: make package-installer-windows-amd64
      - uses: actions/upload-artifact@v7
        with:
          name: installer-windows-amd64
          path: obs-spotify-lyrics-*-setup.exe
          retention-days: 1

  sign-installer:
    needs: [build-installer-windows]
    runs-on: ubuntu-latest
    concurrency:
      group: signing
      cancel-in-progress: false
    steps:
      - name: Check signing credentials
        id: check
        env:
          OSSLSIGNSERVER_URL: ${{ secrets.OSSLSIGNSERVER_URL }}
          OSSLSIGNSERVER_API_KEY_SECRET: ${{ secrets.OSSLSIGNSERVER_API_KEY_SECRET }}
          OSSLSIGNSERVER_PROFILE: ${{ vars.OSSLSIGNSERVER_PROFILE }}
        run: |
          if [ -z "$OSSLSIGNSERVER_URL" ] || [ -z "$OSSLSIGNSERVER_API_KEY_SECRET" ] || [ -z "$OSSLSIGNSERVER_PROFILE" ]; then
            echo "available=false" >> $GITHUB_OUTPUT
            echo "Signing credentials not available"
            exit 0
          fi
          echo "available=true" >> $GITHUB_OUTPUT
      - uses: actions/download-artifact@v8
        if: steps.check.outputs.available == 'true'
        with:
          name: installer-windows-amd64
          path: artifacts
      - name: Find installer file
        if: steps.check.outputs.available == 'true'
        id: installer
        run: |
          INSTALLER=$(ls artifacts/obs-spotify-lyrics-*-setup.exe 2>/dev/null | head -1)
          if [ -z "$INSTALLER" ]; then
            echo "::error::Installer not found"
            exit 1
          fi
          echo "path=$INSTALLER" >> $GITHUB_OUTPUT
      - name: Sign installer
        if: steps.check.outputs.available == 'true'
        uses: icedream/sign-with-osslsignserver-action@7425d525e730035301735d225c2dd4da025d13c2
        with:
          url: ${{ secrets.OSSLSIGNSERVER_URL }}
          api-key-secret: ${{ secrets.OSSLSIGNSERVER_API_KEY_SECRET }}
          profile: ${{ vars.OSSLSIGNSERVER_PROFILE }}
          file: ${{ steps.installer.outputs.path }}
          description: 'Spotify Lyrics for OBS'
          description-url: 'https://github.com/icedream/obs-spotify-lyrics'
      - uses: actions/upload-artifact@v7
        if: steps.check.outputs.available == 'true'
        with:
          name: installer-windows-amd64
          path: ${{ steps.installer.outputs.path }}
          overwrite: true
