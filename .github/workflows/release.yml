name: Release
on:
  push:
    tags:
      - 'v*'

env:
  OBS_VERSION: "32.1.2"

jobs:
  build-binary:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suffix: [linux-amd64, linux-arm64, windows-amd64, windows-arm64]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make build-binary-${{ matrix.suffix }}
      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.suffix }}
          path: lyrics-${{ matrix.suffix }}*

  build-plugin-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - {runner: ubuntu-latest,    suffix: linux-amd64}
          - {runner: ubuntu-24.04-arm, suffix: linux-arm64}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install libobs-dev
        run: sudo apt-get update -y && sudo apt-get install -y libobs-dev
      - run: make build-plugin-${{ matrix.suffix }}
      - uses: actions/upload-artifact@v7
        with:
          name: plugin-${{ matrix.suffix }}
          path: spotify-lyrics-${{ matrix.suffix }}.so

  build-plugin-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install MinGW cross-compiler and gendef
        run: sudo apt-get install -y mingw-w64 mingw-w64-tools
      - name: Cache OBS Windows SDK
        uses: actions/cache@v6
        with:
          path: |
            obs-src
            obs-win-sdk
          key: obs-win-sdk-${{ env.OBS_VERSION }}-x64
      - run: make build-plugin-windows-amd64
      - uses: actions/upload-artifact@v7
        with:
          name: plugin-windows-amd64
          path: spotify-lyrics-windows-amd64.dll

  sign-windows-binaries:
    needs: [build-binary, build-plugin-windows]
    runs-on: ubuntu-latest
    concurrency:
      group: signing
      cancel-in-progress: false
    steps:
      - name: Check signing credentials
        id: check
        env:
          OSSLSIGNSERVER_URL: ${{ secrets.OSSLSIGNSERVER_URL }}
          OSSLSIGNSERVER_API_KEY_SECRET: ${{ secrets.OSSLSIGNSERVER_API_KEY_SECRET }}
          OSSLSIGNSERVER_PROFILE: ${{ vars.OSSLSIGNSERVER_PROFILE }}
        run: |
          if [ -z "$OSSLSIGNSERVER_URL" ] || [ -z "$OSSLSIGNSERVER_API_KEY_SECRET" ] || [ -z "$OSSLSIGNSERVER_PROFILE" ]; then
            echo "available=false" >> $GITHUB_OUTPUT
            echo "Signing credentials not available"
            exit 0
          fi
          echo "available=true" >> $GITHUB_OUTPUT
      - uses: actions/download-artifact@v8
        if: steps.check.outputs.available == 'true'
        with:
          name: binary-windows-amd64
          path: artifacts
      - uses: actions/download-artifact@v8
        if: steps.check.outputs.available == 'true'
        with:
          name: binary-windows-arm64
          path: artifacts
      - uses: actions/download-artifact@v8
        if: steps.check.outputs.available == 'true'
        with:
          name: plugin-windows-amd64
          path: artifacts
      - name: Sign lyrics-windows-amd64.exe
        if: steps.check.outputs.available == 'true'
        uses: icedream/sign-with-osslsignserver-action@5fd3bd4b5f682fdc6570740ec82aeea206d23433
        with:
          url: ${{ secrets.OSSLSIGNSERVER_URL }}
          api-key-secret: ${{ secrets.OSSLSIGNSERVER_API_KEY_SECRET }}
          profile: ${{ vars.OSSLSIGNSERVER_PROFILE }}
          file: artifacts/lyrics-windows-amd64.exe
          description: 'Spotify Lyrics for OBS'
          description-url: 'https://github.com/icedream/obs-spotify-lyrics'
      - name: Sign lyrics-windows-arm64.exe
        if: steps.check.outputs.available == 'true'
        uses: icedream/sign-with-osslsignserver-action@5fd3bd4b5f682fdc6570740ec82aeea206d23433
        with:
          url: ${{ secrets.OSSLSIGNSERVER_URL }}
          api-key-secret: ${{ secrets.OSSLSIGNSERVER_API_KEY_SECRET }}
          profile: ${{ vars.OSSLSIGNSERVER_PROFILE }}
          file: artifacts/lyrics-windows-arm64.exe
          description: 'Spotify Lyrics for OBS'
          description-url: 'https://github.com/icedream/obs-spotify-lyrics'
      - name: Sign spotify-lyrics-windows-amd64.dll
        if: steps.check.outputs.available == 'true'
        uses: icedream/sign-with-osslsignserver-action@5fd3bd4b5f682fdc6570740ec82aeea206d23433
        with:
          url: ${{ secrets.OSSLSIGNSERVER_URL }}
          api-key-secret: ${{ secrets.OSSLSIGNSERVER_API_KEY_SECRET }}
          profile: ${{ vars.OSSLSIGNSERVER_PROFILE }}
          file: artifacts/spotify-lyrics-windows-amd64.dll
          description: 'Spotify Lyrics for OBS'
          description-url: 'https://github.com/icedream/obs-spotify-lyrics'
      - uses: actions/upload-artifact@v7
        if: steps.check.outputs.available == 'true'
        with:
          name: binary-windows-amd64
          path: artifacts/lyrics-windows-amd64.exe
          overwrite: true
      - uses: actions/upload-artifact@v7
        if: steps.check.outputs.available == 'true'
        with:
          name: binary-windows-arm64
          path: artifacts/lyrics-windows-arm64.exe
          overwrite: true
      - uses: actions/upload-artifact@v7
        if: steps.check.outputs.available == 'true'
        with:
          name: plugin-windows-amd64
          path: artifacts/spotify-lyrics-windows-amd64.dll
          overwrite: true

  build-installer-windows:
    needs: [sign-windows-binaries]
    if: success() || (needs.sign-windows-binaries.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: binary-windows-amd64
      - uses: actions/download-artifact@v8
        with:
          name: plugin-windows-amd64
      - name: Install NSIS
        run: sudo apt-get update -y && sudo apt-get install -y nsis
      - run: make package-installer-windows-amd64
      - uses: actions/upload-artifact@v7
        with:
          name: installer-windows-amd64
          path: obs-spotify-lyrics-*-setup.exe

  sign-installer:
    needs: [build-installer-windows]
    runs-on: ubuntu-latest
    concurrency:
      group: signing
      cancel-in-progress: false
    steps:
      - name: Check signing credentials
        id: check
        env:
          OSSLSIGNSERVER_URL: ${{ secrets.OSSLSIGNSERVER_URL }}
          OSSLSIGNSERVER_API_KEY_SECRET: ${{ secrets.OSSLSIGNSERVER_API_KEY_SECRET }}
          OSSLSIGNSERVER_PROFILE: ${{ vars.OSSLSIGNSERVER_PROFILE }}
        run: |
          if [ -z "$OSSLSIGNSERVER_URL" ] || [ -z "$OSSLSIGNSERVER_API_KEY_SECRET" ] || [ -z "$OSSLSIGNSERVER_PROFILE" ]; then
            echo "available=false" >> $GITHUB_OUTPUT
            echo "Signing credentials not available"
            exit 0
          fi
          echo "available=true" >> $GITHUB_OUTPUT
      - uses: actions/download-artifact@v8
        if: steps.check.outputs.available == 'true'
        with:
          name: installer-windows-amd64
          path: artifacts
      - name: Find installer file
        if: steps.check.outputs.available == 'true'
        id: installer
        run: |
          INSTALLER=$(ls artifacts/obs-spotify-lyrics-*-setup.exe 2>/dev/null | head -1)
          if [ -z "$INSTALLER" ]; then
            echo "::error::Installer not found"
            exit 1
          fi
          echo "path=$INSTALLER" >> $GITHUB_OUTPUT
      - name: Sign installer
        if: steps.check.outputs.available == 'true'
        uses: icedream/sign-with-osslsignserver-action@5fd3bd4b5f682fdc6570740ec82aeea206d23433
        with:
          url: ${{ secrets.OSSLSIGNSERVER_URL }}
          api-key-secret: ${{ secrets.OSSLSIGNSERVER_API_KEY_SECRET }}
          profile: ${{ vars.OSSLSIGNSERVER_PROFILE }}
          file: ${{ steps.installer.outputs.path }}
          description: 'Spotify Lyrics for OBS'
          description-url: 'https://github.com/icedream/obs-spotify-lyrics'
      - uses: actions/upload-artifact@v7
        if: steps.check.outputs.available == 'true'
        with:
          name: installer-windows-amd64
          path: ${{ steps.installer.outputs.path }}
          overwrite: true

  release:
    needs: [build-binary, build-plugin-linux, build-plugin-windows, sign-windows-binaries, sign-installer]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Package release archives
        run: |
          mkdir -p pkg

          for suffix in linux-amd64 linux-arm64; do
            mkdir -p staging
            cp dist/lyrics-$suffix LICENSE.txt staging/
            tar czf pkg/server-$suffix.tar.gz -C staging .
            rm -rf staging
          done

          for suffix in windows-amd64 windows-arm64; do
            mkdir -p staging
            cp dist/lyrics-$suffix.exe LICENSE.txt staging/
            (cd staging && zip ../pkg/server-$suffix.zip *)
            rm -rf staging
          done

          for suffix in linux-amd64 linux-arm64; do
            mkdir -p staging
            cp dist/spotify-lyrics-$suffix.so LICENSE.txt staging/
            tar czf pkg/plugin-$suffix.tar.gz -C staging .
            rm -rf staging
          done

          mkdir -p staging
          cp dist/spotify-lyrics-windows-amd64.dll LICENSE.txt staging/
          (cd staging && zip ../pkg/plugin-windows-amd64.zip *)
          rm -rf staging

          cp dist/obs-spotify-lyrics-*-setup.exe pkg/
      - name: Generate SHA256SUMS
        run: cd pkg && sha256sum * > SHA256SUMS
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2
      - name: Sign release assets with cosign
        run: |
          for f in pkg/*; do
            cosign sign-blob --yes --bundle "${f}.bundle" "$f"
          done
      - name: Sign SHA256SUMS with GPG
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSPHRASE: ${{ secrets.GPG_SIGNING_PASSPHRASE }}
        run: |
          if [ -z "$GPG_SIGNING_KEY" ]; then
            echo "GPG_SIGNING_KEY not set, skipping GPG signing"
            exit 0
          fi
          echo "$GPG_SIGNING_KEY" | gpg --batch --import
          echo "$GPG_SIGNING_PASSPHRASE" | gpg --batch --yes --passphrase-fd 0 \
            --pinentry-mode loopback \
            --detach-sign --armor --output pkg/SHA256SUMS.asc pkg/SHA256SUMS
      - uses: softprops/action-gh-release@v3
        with:
          files: pkg/*

