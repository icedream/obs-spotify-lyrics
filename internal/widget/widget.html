<!DOCTYPE html>
<!--
  Spotify Lyrics Widget - OBS Browser Source
  1. Run the lyrics server
  2. In OBS, add a Browser Source pointing to this file (this is served by the
     server by default on http://localhost:8080/)
  3. Tick "Allow transparency" in the source settings.
  4. Resize/position the source to suit your layout.

  All visual settings live in the :root block directly below.
  Edit those CSS variables to match your stream's overlay theme.
  The JavaScript section further down handles the live sync logic
  and does not normally need to be changed.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lyrics Widget</title>
  <style id="obs-default">

    /* Customise here: change these values to match your overlay theme. */
    :root {
      /* OBS font picker markers - the plugin expands these into sub-variables. */
      --current-font:  ; /* obs: Font | Active line | font */
      --adjacent-font: ; /* obs: Font | Adjacent lines | font */

      /* Fallback sub-variables used when the widget is loaded outside OBS. */
      --current-family:     'Segoe UI', system-ui, sans-serif;
      --current-size:       24pt;
      --current-weight:     700;
      --current-style:      normal;
      --current-decoration: none;

      --adjacent-family:     'Segoe UI', system-ui, sans-serif;
      --adjacent-size:       16pt;
      --adjacent-weight:     400;
      --adjacent-style:      normal;
      --adjacent-decoration: none;

      /* Current (active) lyric line */
      --current-color:   #ffffff;                         /* obs: Color | Active line | color-alpha */

      /* Previous and next lines (dimmed context) */
      --adjacent-color:  rgba(255, 255, 255, 0.45);       /* obs: Color | Adjacent lines | color-alpha */

      /* Height of each line slot. Must comfortably fit --current-size. */
      --row-height:      64px;                              /* obs: Row height | Layout | number:px+ */

      /* Padding around the lyrics block */
      --padding-top:     0px;                               /* obs: Padding top | Padding | number:px+ */
      --padding-bottom:  0px;                               /* obs: Padding bottom | Padding | number:px+ */
      --padding-left:    16px;                              /* obs: Padding left | Padding | number:px+ */
      --padding-right:   16px;                              /* obs: Padding right | Padding | number:px+ */

      --text-shadow-x:     0px;                             /* obs: X offset | Text shadow | number:px */
      --text-shadow-y:     2px;                             /* obs: Y offset | Text shadow | number:px */
      --text-shadow-blur:  10px;                            /* obs: Blur radius | Text shadow | number:px+ */
      --text-shadow-color: rgba(0, 0, 0, 0.8);            /* obs: Color | Text shadow | color-alpha */

      /* Duration of the scroll animation */
      --scroll-duration: 0.35s;                             /* obs: Scroll duration | Animation | number:ms */

      /* How long the fade-out after the last line takes */
      --fadeout-duration: 1.5s;                             /* obs: Fade-out duration | Animation | number:ms */
    }
    /* End of customisation */


    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /*
     * #stage clips to exactly 3 visible rows. The 4th slot (#incoming) lives
     * below the fold and slides up into view during each line transition.
     */
    #stage {
      overflow: hidden;
      height: calc(var(--row-height) * 3);
      width: 100%;
      padding-top: var(--padding-top);
      padding-bottom: var(--padding-bottom);
      padding-left: var(--padding-left);
      padding-right: var(--padding-left);
      transition: opacity var(--fadeout-duration) ease;
    }

    /* Translated upward during the scroll animation. */
    #lines {
      display: flex;
      flex-direction: column;
    }

    .slot {
      height: var(--row-height);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .line {
      text-align: center;
      text-shadow: var(--text-shadow-x) var(--text-shadow-y) var(--text-shadow-blur) var(--text-shadow-color);
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.3;
    }

    .line.current {
      color:           var(--current-color);
      font-family:     var(--current-family);
      font-size:       var(--current-size);
      font-weight:     var(--current-weight);
      font-style:      var(--current-style);
      text-decoration: var(--current-decoration);
    }

    .line.adjacent {
      color:           var(--adjacent-color);
      font-family:     var(--adjacent-family);
      font-size:       var(--adjacent-size);
      font-weight:     var(--adjacent-weight);
      font-style:      var(--adjacent-style);
      text-decoration: var(--adjacent-decoration);

      z-index: -100;
    }

  </style>
  <!-- Populated at runtime via DispatchJSEvent when plugin settings change. -->
  <style id="obs-css"></style>
</head>
<body>

<div id="stage">
  <div id="lines">
    <div class="slot"><div id="prev"     class="line adjacent"></div></div>
    <div class="slot"><div id="cur"      class="line current" ></div></div>
    <div class="slot"><div id="next"     class="line adjacent"></div></div>
    <div class="slot"><div id="incoming" class="line adjacent"></div></div>
  </div>
</div>

<script>
  /* State */

  let lyrics        = [];
  let positionMs    = 0;
  let isPlaying     = false;
  let receivedAt    = 0;
  let activeIndex   = -1;
  let scrolling     = false;
  let trackId       = '';
  let lastLineEndMs = 0;   // end_ms of the last lyric line; 0 = unknown
  let fadingOut     = false;

  /* DOM references */

  const stageEl    = document.getElementById('stage');
  const linesEl    = document.getElementById('lines');
  const prevEl     = document.getElementById('prev');
  const curEl      = document.getElementById('cur');
  const nextEl     = document.getElementById('next');
  const incomingEl = document.getElementById('incoming');

  /* Helpers */

  function textAt(i) {
    return (i >= 0 && i < lyrics.length) ? lyrics[i].words : '';
  }

  // Enable or disable the CSS transitions used during a scroll animation.
  // cur and next also transition their size/color as they swap roles.
  // stageEl is included so that snapTo() opacity changes are always instant.
  function setTransitions(on) {
    const d = `var(--scroll-duration) ease`;
    linesEl.style.transition    = on ? `transform ${d}`                                    : 'none';
    prevEl.style.transition     = on ? `opacity ${d}`                                      : 'none';
    incomingEl.style.transition = on ? `opacity ${d}`                                      : 'none';
    curEl.style.transition      = on ? `font-size ${d}, color ${d}, font-weight ${d}, font-style ${d}` : 'none';
    nextEl.style.transition     = on ? `font-size ${d}, color ${d}, font-weight ${d}, font-style ${d}` : 'none';
    stageEl.style.transition    = on ? ''                                                  : 'none';
  }

  // Immediately render the display for `index` with no animation.
  function snapTo(index) {
    setTransitions(false);
    linesEl.style.transform  = '';
    linesEl.offsetHeight;   // flush layout so no pending transitions can fire

    // Hide the stage when pre-lyrics; restore it otherwise.
    // stageEl transitions are off here (setTransitions(false) above), so this is instant.
    fadingOut             = false;
    stageEl.style.opacity = index < 0 ? '0' : '';

    prevEl.textContent     = textAt(index - 1);
    curEl.textContent      = textAt(index);
    nextEl.textContent     = textAt(index + 1);
    incomingEl.textContent = '';

    prevEl.className     = 'line adjacent';
    curEl.className      = 'line current';
    nextEl.className     = 'line adjacent';
    incomingEl.className = 'line adjacent';

    prevEl.style.opacity     = (index > 0)                                ? '' : '0';
    curEl.style.opacity      = (index >= 0 && lyrics.length > 0)          ? '' : '0';
    nextEl.style.opacity     = (index >= 0 && index < lyrics.length - 1)  ? '' : '0';
    incomingEl.style.opacity = '0';

    activeIndex = index;
    scrolling   = false;
  }

  // Scroll forward by one line with animation.
  // #lines translates up by one row. The departing line fades out, the
  // incoming line fades in, and cur/next cross-fade their size and colour.
  function scrollForward() {
    if (scrolling) return;
    scrolling = true;

    const newIndex = activeIndex + 1;

    // Stage the next-next line below the fold, initially invisible.
    incomingEl.textContent   = textAt(newIndex + 1);
    incomingEl.style.opacity = '0';
    linesEl.offsetHeight;   // commit so the browser records opacity:0 as the start state

    setTransitions(true);

    linesEl.style.transform  = 'translateY(calc(-1 * var(--row-height)))';
    prevEl.style.opacity     = '0';
    incomingEl.style.opacity = (newIndex < lyrics.length - 1) ? '' : '0';
    curEl.className          = 'line adjacent';
    nextEl.className         = 'line current';

    linesEl.addEventListener('transitionend', function onDone(e) {
      if (e.target !== linesEl || e.propertyName !== 'transform') return;
      linesEl.removeEventListener('transitionend', onDone);

      snapTo(newIndex);
      requestAnimationFrame(() => requestAnimationFrame(() => setTransitions(true)));
    });
  }

  /* Animation loop */

  function tick() {
    requestAnimationFrame(tick);

    if (lyrics.length === 0 || scrolling) return;

    const currentMs = isPlaying
      ? positionMs + (performance.now() - receivedAt)
      : positionMs;

    // Fade out after the last line has finished.
    if (lastLineEndMs > 0 && currentMs > lastLineEndMs) {
      if (!fadingOut) {
        fadingOut             = true;
        stageEl.style.opacity = '0';
      }
      return;
    }
    if (fadingOut) {
      fadingOut             = false;
      stageEl.style.opacity = '';
    }

    let newIndex = -1;
    for (let i = 0; i < lyrics.length; i++) {
      if (lyrics[i].start_ms <= currentMs) newIndex = i;
      else break;
    }

    if (newIndex === activeIndex) return;

    if (newIndex === activeIndex + 1 && activeIndex >= 0) {
      scrollForward();
    } else {
      // Seek, jump, or initial display: snap directly without animation.
      // If the stage was hidden (intro period), fade it in rather than snapping it visible.
      const fadeIn       = stageEl.style.opacity === '0' && newIndex >= 0;
      const snapIndex    = newIndex;
      snapTo(newIndex);
      if (fadeIn) stageEl.style.opacity = '0';  // snapTo restored it; keep hidden until transitions are on
      requestAnimationFrame(() => requestAnimationFrame(() => {
        setTransitions(true);
        if (fadeIn && activeIndex === snapIndex) stageEl.style.opacity = '';
      }));
    }
  }

  requestAnimationFrame(tick);

  /* WebSocket connection */

  let reconnectDelay = 1000;

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsurl = location.protocol === 'file:'
      ? 'http://localhost:8080/ws' /* used when loaded as a file directly */
      : proto + '//' + location.host + '/ws' /* used when loaded via HTTP(S) */;
    console.log(wsurl);
    const ws    = new WebSocket(wsurl);

    ws.onopen = () => { reconnectDelay = 1000; };

    ws.onmessage = (event) => {
      const msg        = JSON.parse(event.data);
      const newTrackId = msg.track?.id ?? '';

      if (msg.type === 'playing') {
        const trackChanged  = newTrackId !== trackId;
        const trackDurMs    = msg.track?.duration_ms || 0;
        trackId    = newTrackId;
        lyrics     = msg.lyrics || [];
        positionMs = msg.position_ms;
        isPlaying  = msg.is_playing;
        receivedAt = performance.now();

        if (trackChanged || lyrics.length === 0) {
          // Clear immediately; tick() will render the right line once lyrics arrive.
          snapTo(-1);
          requestAnimationFrame(() => requestAnimationFrame(() => setTransitions(true)));
        } else {
          // Same track (seek or pause/resume): let tick() recalculate position.
          activeIndex   = -1;
          scrolling     = false;
        }

        // Always recalculate the fade-out point whenever we have lyrics,
        // including on first load and track changes.
        // Fallback chain: server-provided end_ms -> track duration -> 5 s after last line start.
        if (lyrics.length > 0) {
          const last = lyrics[lyrics.length - 1];
          lastLineEndMs = last.end_ms || trackDurMs || (last.start_ms + 5000);
        } else {
          lastLineEndMs = 0;
        }
      } else if (msg.type === 'idle') {
        trackId       = '';
        lyrics        = [];
        lastLineEndMs = 0;
        isPlaying     = false;
        snapTo(-1);
      }
    };

    ws.onclose = () => {
      lyrics    = [];
      isPlaying = false;
      snapTo(-1);
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, 30_000);
    };
  }

  connect();

  /* Live CSS updates from OBS plugin settings (no page reload) */
  const obsCssEl = document.getElementById('obs-css');

  // OBS browser source injects a <style> element (no id) by appending it to
  // <head> on page load. Keep obs-css last so live updates take precedence.
  new MutationObserver(() => {
    if (document.head.lastElementChild !== obsCssEl) {
      document.head.appendChild(obsCssEl);
    }
  }).observe(document.head, { childList: true });

  window.addEventListener('obsCSS', (e) => {
    if (typeof e.detail === 'string') {
      // Actively remove OBS browser source's injected style (no id) so it
      // cannot override the update we're about to apply.
      document.querySelectorAll('head > style:not([id])').forEach(s => s.remove());
      obsCssEl.textContent = e.detail;
    }
  });
</script>

</body>
</html>
